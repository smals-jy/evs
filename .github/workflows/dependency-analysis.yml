name: Dependency Analysis

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      fail_on_unused:
        description: "Fail the build if unused dependencies are found"
        required: false
        default: false
        type: boolean

jobs:
  dependency_analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: 🔍 Run dependency analysis for all modules
        id: analyze
        run: |
          set +e
          
          ANALYSIS_OUTPUT="dependency-analysis-output.txt"
          UNUSED_DEPS_FOUND=false
          
          echo "=== EVS Dependency Analysis Report ===" > $ANALYSIS_OUTPUT
          echo "Generated: $(date)" >> $ANALYSIS_OUTPUT
          echo "" >> $ANALYSIS_OUTPUT
          
          # Array of all modules
          MODULES=("super" "core" "validator" "ehconnector" "viewer" "datagenerator" "distribution")
          
          for module in "${MODULES[@]}"; do
            if [ -d "$module" ] && [ -f "$module/pom.xml" ]; then
              echo "====================================" >> $ANALYSIS_OUTPUT
              echo "Module: $module" >> $ANALYSIS_OUTPUT
              echo "====================================" >> $ANALYSIS_OUTPUT
              echo "" >> $ANALYSIS_OUTPUT
              
              cd $module
              
              # Run dependency analysis
              ANALYSIS=$(mvn dependency:analyze -DoutputXML=false 2>&1)
              echo "$ANALYSIS" >> ../$ANALYSIS_OUTPUT
              
              # Check for unused declared dependencies
              if echo "$ANALYSIS" | grep -q "Unused declared dependencies"; then
                UNUSED_DEPS_FOUND=true
              fi
              
              echo "" >> ../$ANALYSIS_OUTPUT
              cd ..
            fi
          done
          
          echo "output_file=$ANALYSIS_OUTPUT" >> $GITHUB_OUTPUT
          echo "unused_found=$UNUSED_DEPS_FOUND" >> $GITHUB_OUTPUT
          
          cat $ANALYSIS_OUTPUT

      - name: 📊 Generate summary report
        if: always()
        run: |
          echo "## 📋 Maven Dependency Analysis Report" > $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Analysis Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.analyze.outputs.unused_found }}" == "true" ]; then
            echo "⚠️ **Status:** Unused dependencies detected" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **Status:** No unused dependencies found" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Analyzed Modules" >> $GITHUB_STEP_SUMMARY
          echo "- super (parent pom)" >> $GITHUB_STEP_SUMMARY
          echo "- core" >> $GITHUB_STEP_SUMMARY
          echo "- validator" >> $GITHUB_STEP_SUMMARY
          echo "- ehconnector" >> $GITHUB_STEP_SUMMARY
          echo "- viewer" >> $GITHUB_STEP_SUMMARY
          echo "- datagenerator" >> $GITHUB_STEP_SUMMARY
          echo "- distribution" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "For detailed analysis, download the artifact: **dependency-analysis-report**" >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload analysis report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: dependency-analysis-report
          path: dependency-analysis-output.txt
          retention-days: 30

      - name: 💬 Comment on PR with analysis results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const unused_found = "${{ steps.analyze.outputs.unused_found }}" === "true";
            
            let comment_body = "## 🔍 Dependency Analysis Results\n\n";
            
            if (unused_found) {
              comment_body += "⚠️ **Unused dependencies detected!**\n\n";
              comment_body += "Maven found unused declared dependencies in your code.\n\n";
              comment_body += "### Recommendations:\n";
              comment_body += "1. Download the **dependency-analysis-report** artifact from the workflow run\n";
              comment_body += "2. Review the detected unused dependencies\n";
              comment_body += "3. Remove or verify the necessity of these dependencies\n";
              comment_body += "4. Update `pom.xml` files accordingly\n\n";
              comment_body += "**Note:** Some dependencies may be required for transitive exclusions or runtime functionality.\n";
            } else {
              comment_body += "✅ **No unused dependencies found!**\n\n";
              comment_body += "All declared dependencies in the analyzed modules appear to be in use.\n";
            }
            
            comment_body += "\n[View full report in workflow artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})";
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment_body
            });

      - name: 🚨 Fail on unused dependencies (if enabled)
        if: |
          steps.analyze.outputs.unused_found == 'true' && 
          github.event.inputs.fail_on_unused == 'true'
        run: |
          echo "❌ Unused dependencies found and fail_on_unused is enabled!"
          echo "Please review the dependency analysis report and remove unused dependencies."
          exit 1

      - name: ✅ Analysis completed successfully
        if: always()
        run: |
          echo "Dependency analysis workflow completed!"
          echo "Unused dependencies found: ${{ steps.analyze.outputs.unused_found }}"
