name: Dependency Analysis

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      fail_on_unused:
        description: "Fail the build if unused dependencies are found"
        required: false
        default: false
        type: boolean

jobs:
  dependency_analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: 🔍 Run global dependency analysis
        id: analyze
        run: |
          set +e
          
          REPORT_FILE="/tmp/dependency-report.txt"
          
          echo "=== EVS Global Dependency Analysis Report ===" | tee "$REPORT_FILE"
          echo "Generated: $(date)" | tee -a "$REPORT_FILE"
          echo "" | tee -a "$REPORT_FILE"
          
          # Run dependency analysis for the entire project
          echo "🔎 Analyzing all dependencies in the project..." | tee -a "$REPORT_FILE"
          ANALYSIS=$(mvn dependency:analyze -DoutputXML=false 2>&1)
          echo "$ANALYSIS" | tee -a "$REPORT_FILE"
          
          # Check for unused declared dependencies
          UNUSED_DEPS_FOUND=false
          if echo "$ANALYSIS" | grep -q "Unused declared dependencies"; then
            UNUSED_DEPS_FOUND=true
            echo "" | tee -a "$REPORT_FILE"
            echo "⚠️ WARNING: Unused dependencies detected across the project" | tee -a "$REPORT_FILE"
          fi
          
          echo "unused_found=$UNUSED_DEPS_FOUND" >> $GITHUB_OUTPUT
          cat "$REPORT_FILE" >> $GITHUB_STEP_SUMMARY

      - name: 📊 Generate summary report
        if: always()
        run: |
          echo "## 📋 Maven Global Dependency Analysis Report" > $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Analysis Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.analyze.outputs.unused_found }}" == "true" ]; then
            echo "⚠️ **Status:** Unused dependencies detected" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **Status:** No unused dependencies found" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Scope" >> $GITHUB_STEP_SUMMARY
          echo "All modules analyzed as a unified project (super parent POM and all child modules)" >> $GITHUB_STEP_SUMMARY

      - name: 🚨 Fail on unused dependencies (if enabled)
        if: |
          steps.analyze.outputs.unused_found == 'true' && 
          github.event.inputs.fail_on_unused == 'true'
        run: |
          echo "❌ Unused dependencies found and fail_on_unused is enabled!"
          echo "Please review the dependency analysis report and remove unused dependencies."
          exit 1

      - name: ✅ Analysis completed successfully
        if: always()
        run: |
          echo "Dependency analysis workflow completed!"
          echo "Unused dependencies found: ${{ steps.analyze.outputs.unused_found }}"
